<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "@material/web/": "https://esm.run/@material/web/"
  }
}
</script>

<script type="module">
import '@material/web/all.js';
import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';

document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
</script>
</head>

<body>

<form>
  <!-- <md-circular-progress indeterminate></md-circular-progress> -->
  <md-linear-progress indeterminate></md-linear-progress>
</form>

<style>
:root{
  color-scheme: light dark;
}

/* LIGHT MODE */
@media (prefers-color-scheme: light){
  body{
    background:#ffffff;
    color:#000000;
    font-family:Roboto, sans-serif;
  }

  md-circular-progress{
    --md-circular-progress-active-indicator-color:#6750A4;
  }

  md-linear-progress{
    --md-linear-progress-active-indicator-color:#6750A4;
    --md-linear-progress-track-color:#E7E0EC;
  }
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
  body{
    background:#121212;
    color:#ffffff;
    font-family:Roboto, sans-serif;
  }

  md-circular-progress{
    --md-circular-progress-active-indicator-color:#D0BCFF;
  }

  md-linear-progress{
    --md-linear-progress-active-indicator-color:#D0BCFF;
    --md-linear-progress-track-color:#3B3643;
  }
}

form{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px;
  height:100vh;
}

md-linear-progress{
  width:400px;
  border-radius:4px;
  overflow:hidden;
}

md-circular-progress{
  width:64px;
  height:64px;
}
</style>

</body>
</html>
